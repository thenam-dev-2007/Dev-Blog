<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="./asset/css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a class="logo" href="index.html">BLOG LOGO</a>
            <nav class="header-nav">
                <a href="index.html">Home</a>
                <a href="categories.html">Categories</a>
                <a href="faq.html">FAQ</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="header-right">
                <div class="search-wrapper">
                    <input type="text" id="headerSearch" placeholder="Tìm kiếm...">
                    <button class="btn-search-icon" onclick="toggleSearch()" title="Tìm kiếm">🔍</button>
                </div>
                <button class="btn-darkmode" onclick="toggleDarkMode()" id="btnDarkMode" title="Chế độ tối">🌙</button>
                <a href="login.html" class="btn-dangnhap">Đăng nhập</a>
            </div>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-box">
            <h1>Tạo tài khoản</h1>
            <p class="chu-nho">Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>

            <div class="form-group">
                <label for="reg-name">Họ tên hiển thị</label>
                <input id="reg-name" type="text" placeholder="Tên của bạn">
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input id="reg-email" type="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="reg-pass">Mật khẩu</label>
                <input id="reg-pass" type="password" placeholder="Ít nhất 8 ký tự">
            </div>
            <div class="form-group">
                <label for="reg-confirm">Xác nhận mật khẩu</label>
                <input id="reg-confirm" type="password" placeholder="Nhập lại mật khẩu">
            </div>
            <div class="form-group" style="display: flex; align-items: flex-start; gap: 10px;">
                <input id="agree" type="checkbox" style="width: 15px; height: 15px; margin-top: 2px; flex-shrink: 0;">
                <label for="agree" style="font-size: 0.85rem; color: var(--mau-chu-nhat); font-weight: normal;">
                    Tôi đồng ý với <a href="#">điều khoản dịch vụ</a> và <a href="#">chính sách bảo mật</a>
                </label>
            </div>

            <a href="index.html" class="button btn-full">Tạo tài khoản</a>
        </div>
    </main>

    <footer class="footer">
        <nav class="footer-nav">
            <a href="index.html">Home</a>
            <a href="about.html">Giới thiệu</a>
            <a href="faq.html">FAQ</a>
            <a href="contact.html">Liên hệ</a>
            <a href="#">Điều khoản</a>
            <a href="#">Quyền riêng tư</a>
        </nav>
        <p class="footer-copy">© 2026 Blog Platform. All rights reserved.</p>
    </footer>
    <script src="./asset/script/main.js"></script>
</body>
</html>
