<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực tài khoản</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a class="logo" href="index.html">BLOG LOGO</a>
            <nav class="header-nav">
                <a href="index.html">Home</a><span class="separator">|</span>
                <a href="categories.html">Categories</a><span class="separator">|</span>
                <a href="faq.html">FAQ</a><span class="separator">|</span>
                <a href="about.html">About</a><span class="separator">|</span>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="header-right">
                <input class="search-input" type="text" placeholder="Tìm kiếm...">
                <button class="button" type="button">Tìm</button>
                <a href="auth.html"><img class="profile-icon" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRQvbBkan9f5Y_lGtjeuDAU_GHcoaHBhd9GEw&s" alt="Avatar"></a>
            </div>
        </div>
    </header>

    <main>
        <section class="section-card page-banner">
            <h1>Xác thực tài khoản</h1>
            <p>Đăng nhập hoặc đăng ký để truy cập nội dung và tính năng của hệ thống.</p>
        </section>
        <div class="card-row">
            <section class="section-card form-card">
                <h2>Đăng nhập</h2>
                <form action="index.html" method="GET">
                    <div class="form-group">
                        <label for="login-user">Tên đăng nhập / Email</label>
                        <input id="login-user" type="text" placeholder="Tên đăng nhập / Email">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Mật khẩu</label>
                        <button type="button" id="togglePassword">👁</button>
                        <input id="login-password" type="password" placeholder="Mật khẩu">
                        <div id="passwordStrength"></div>
                    </div>
                    <button type="submit">Truy cập hệ thống</button>
                </form>
            </section>
            <section class="section-card form-card">
                <h2>Đăng ký thành viên</h2>
                <form action="#" method="POST" id="register-form">
                    <div class="form-group">
                        <label for="register-name">Họ tên hiển thị</label>
                        <input id="register-name" type="text" placeholder="Họ tên hiển thị">
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email đăng ký</label>
                        <input id="register-email" type="email" placeholder="Email đăng ký">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Mật khẩu mới</label>
                        <input id="register-password" type="password" placeholder="Mật khẩu mới">
                    </div>
                    <div class="form-group">
                        <label for="register-confirm">Xác nhận mật khẩu</label>
                        <input id="register-confirm" type="password" placeholder="Xác nhận mật khẩu">
                    </div>
                    <div class="form-group" style="display:flex; align-items:center; gap:10px;">
                        <input id="agree" type="checkbox">
                        <label for="agree">Tôi đồng ý với các điều khoản.</label>
                    </div>
                    <button type="submit">Tạo tài khoản ngay</button>
                </form>
            </section>
        </div>
        <script src="auth.js"></script>
    </main>

    <footer class="footer">© 2026 Blog Platform. All rights reserved.</footer>
</body>
</html>
