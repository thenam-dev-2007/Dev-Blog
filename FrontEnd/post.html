<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài viết</title>
    <link rel="stylesheet" href="./asset/css/style-client.css">
</head>
<body>

<header>
    <div class="header-container">
        <a class="logo" href="index.html">BLOG LOGO</a>
        <nav class="header-nav">
            <a href="index.html">Home</a>
            <a href="categories.html">Categories</a>
            <a href="faq.html">FAQ</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="header-right">
            <div class="search-wrapper">
                <input type="text" id="headerSearch" placeholder="Tìm kiếm...">
                <button class="btn-search-icon" onclick="toggleSearch()" title="Tìm kiếm">🔍</button>
            </div>
            <button class="btn-darkmode" onclick="toggleDarkMode()" id="btnDarkMode" title="Chế độ tối">🌙</button>
            <a href="login.html" class="btn-dangnhap">Đăng nhập</a>
            <a href="register.html" class="btn-dangky">Đăng ký</a>
        </div>
    </div>
</header>


<main>
    <section class="section-card page-banner" id="postBanner">
        <h1>Đang tải bài viết...</h1>
        <p>Vui lòng chờ trong giây lát.</p>
    </section>

    <section class="section-card post-detail" id="postDetail">
        <p>Đang tải...</p>
    </section>

    <section class="section-card">
        <h2>Bình luận</h2>
        <div id="commentsList" style="margin-top:16px;"></div>
        <div id="commentFormWrap" style="margin-top:20px;">
            <form id="commentForm">
                <div class="form-group">
                    <label for="commentContent">Viết bình luận</label>
                    <textarea id="commentContent" placeholder="Nhập bình luận của bạn..." maxlength="1000"></textarea>
                </div>
                <button type="submit" class="button">Gửi bình luận</button>
            </form>
        </div>
    </section>
</main>


<footer class="footer">
    <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="about.html">Giới thiệu</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Liên hệ</a>
        <a href="categories.html">Danh mục</a>
        <a href="admin.html">Admin</a>
        <a href="#">Điều khoản</a>
        <a href="#">Quyền riêng tư</a>
    </nav>
    <p class="footer-copy">© 2026 Blog Platform. All rights reserved.</p>
</footer>

    <script src="./asset/script/main.js"></script>
    <script src="./asset/script/utils.js"></script>
    <script src="./asset/script/post.js"></script>
</body>
</html>
