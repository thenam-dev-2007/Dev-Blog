<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="./asset/css/style-client.css">
</head>
<body>

<header>
    <div class="header-container">
        <a class="logo" href="index.html">DEV BLOG</a>
        <nav class="header-nav">
            <a href="index.html">Home</a>
            <a href="tags.html">Tags</a>
            <a href="faq.html">FAQ</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="header-right">
            <div class="search-wrapper">
                <input type="text" id="headerSearch" placeholder="Tìm kiếm...">
                <button class="btn-search-icon" onclick="toggleSearch()" title="Tìm kiếm">🔍</button>
            </div>
            <button class="btn-darkmode" onclick="toggleDarkMode()" id="btnDarkMode" title="Chế độ tối">🌙</button>
            <a href="login.html" class="btn-dangnhap">Đăng nhập</a>
            <a href="register.html" class="btn-dangky">Đăng ký</a>
        </div>
    </div>
</header>


<main class="auth-page">
    <div class="auth-box">
        <h1>Đăng nhập</h1>
        <p class="chu-nho">Chưa có tài khoản? <a href="register.html">Đăng ký miễn phí</a></p>

        <div id="login-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="login-password">Mật khẩu</label>
                <input id="login-password" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
            </div>
            <div style="text-align:right; margin-bottom:16px;">
                <a href="forgot_password.html" style="font-size:0.82rem; color:var(--mau-chu-nhat);">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="button btn-full">Đăng nhập</button>
        </form>
    </div>
</main>


<footer class="footer">
    <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="about.html">Giới thiệu</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Liên hệ</a>
        <a href="tags.html">Tags</a>
        <a href="admin_login.html">Admin</a>
        <a href="#">Điều khoản</a>
        <a href="#">Quyền riêng tư</a>
    </nav>
    <p class="footer-copy">© 2026  DEV BLOG. All rights reserved.</p>
</footer>

    <script src="./asset/script/main.js"></script>
    <script src="./asset/script/utils.js"></script>
    <script src="./asset/script/login.js"></script>
</body>
</html>
