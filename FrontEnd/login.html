<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a class="logo" href="index.html">BLOG LOGO</a>
            <nav class="header-nav">
                <a href="index.html">Home</a>
                <a href="categories.html">Categories</a>
                <a href="faq.html">FAQ</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="header-right">
                <div class="search-wrapper">
                    <input type="text" id="headerSearch" placeholder="Tìm kiếm...">
                    <button class="btn-search-icon" onclick="toggleSearch()" title="Tìm kiếm">🔍</button>
                </div>
                <button class="btn-darkmode" onclick="toggleDarkMode()" id="btnDarkMode" title="Chế độ tối">🌙</button>
                <a href="register.html" class="btn-dangky">Đăng ký</a>
            </div>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-box">
            <h1>Đăng nhập</h1>
            <p class="chu-nho">Chưa có tài khoản? <a href="register.html">Đăng ký miễn phí</a></p>

            <div class="form-group">
                <label for="login-user">Email / Tên đăng nhập</label>
                <input id="login-user" type="text" placeholder="Nhập email hoặc tên đăng nhập">
            </div>
            <div class="form-group">
                <label for="login-pass">Mật khẩu</label>
                <input id="login-pass" type="password" placeholder="Nhập mật khẩu">
            </div>
            <div style="text-align: right; margin-bottom: 16px;">
                <a href="#" style="font-size: 0.82rem; color: var(--mau-chu-nhat);">Quên mật khẩu?</a>
            </div>

            <a href="index.html" class="button btn-full">Đăng nhập</a>
        </div>
    </main>

    <footer class="footer">
        <nav class="footer-nav">
            <a href="index.html">Home</a>
            <a href="about.html">Giới thiệu</a>
            <a href="faq.html">FAQ</a>
            <a href="contact.html">Liên hệ</a>
            <a href="#">Điều khoản</a>
            <a href="#">Quyền riêng tư</a>
        </nav>
        <p class="footer-copy">© 2026 Blog Platform. All rights reserved.</p>
    </footer>

    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
            document.getElementById("btnDarkMode").textContent = "☀️";
        }

        function toggleDarkMode() {
            document.body.classList.toggle("dark");
            var btn = document.getElementById("btnDarkMode");
            if (document.body.classList.contains("dark")) {
                btn.textContent = "☀️";
                localStorage.setItem("theme", "dark");
            } else {
                btn.textContent = "🌙";
                localStorage.setItem("theme", "light");
            }
        }

        function toggleSearch() {
            var input = document.getElementById("headerSearch");
            input.classList.toggle("open");
            if (input.classList.contains("open")) {
                input.focus();
            } else {
                input.value = "";
            }
        }

        document.getElementById("headerSearch").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && this.value.trim() !== "") {
                window.location.href = "search.html?q=" + encodeURIComponent(this.value.trim());
            }
        });
    </script>
</body>
</html>
