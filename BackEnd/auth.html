<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập & Đăng Ký - Mạng Lưới Blog</title>
</head>
<body>
    <header>
        <h1>Mạng Lưới Blog</h1>
        <nav>
            <ul>
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="about.html">Giới thiệu</a></li>
                <li><a href="auth.html">Đăng nhập / Đăng ký</a></li>
                <li><a href="create.html">Viết bài mới</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Đăng nhập</h2>
            <form action="#" method="POST">
                <label for="login_user">Tên đăng nhập:</label><br>
                <input type="text" id="login_user" name="login_user"><br><br>
                <label for="login_pass">Mật khẩu:</label><br>
                <input type="password" id="login_pass" name="login_pass"><br><br>
                <button type="submit">Đăng nhập</button>
            </form>
        </section>

        <hr>

        <section>
            <h2>Đăng ký thành viên mới</h2>
            <form action="#" method="POST">
                <label for="reg_user">Tên hiển thị:</label><br>
                <input type="text" id="reg_user" name="reg_user"><br><br>
                
                <label for="reg_email">Email:</label><br>
                <input type="email" id="reg_email" name="reg_email"><br><br>
                
                <label for="reg_pass">Mật khẩu:</label><br>
                <input type="password" id="reg_pass" name="reg_pass"><br><br>
                
                <button type="submit">Đăng ký ngay</button>
            </form>
        </section>
    </main>
</body>
</html>
